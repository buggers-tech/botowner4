<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair Code</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;

      /* 🌈 GRADIENT BACKGROUND */
      background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    }

    /* ✨ GLOW LAYER */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, #ff4d4d, transparent 40%),
        radial-gradient(circle at 80% 70%, #33ccff, transparent 40%),
        radial-gradient(circle at 50% 50%, #8b17b6, transparent 50%);
      filter: blur(120px);
      opacity: 0.4;
      animation: moveGlow 15s infinite alternate;
      z-index: 0;
    }

    @keyframes moveGlow {
      0% { transform: translate(0,0); }
      50% { transform: translate(50px,-50px); }
      100% { transform: translate(-50px,50px); }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 300px;
      height: 320px;
      padding: 20px;
      text-align: center;
      background-color: rgba(0,0,0,0.85);
      border-radius: 10px;

      /* 🔥 STRONGER GLOW */
      box-shadow:
        0 0 20px rgba(255,255,255,0.2),
        0 0 40px rgba(138,43,226,0.4),
        0 0 60px rgba(0,255,255,0.3);
    }

    #text { color: #f6f5f5; }
    .centered-text { color: #e9e4e4; text-align:center; }

    /* 🌈 GRADIENT TITLE */
    h3 {
      background: linear-gradient(90deg, orange, yellow, limegreen);
      -webkit-background-clip: text;
      color: transparent;
    }

    .input-container {
      display: flex;
      background: black;
      border-radius: 1rem;
      padding: 0.3rem;
      gap: 0.3rem;
      width: 100%;
    }

    .input-container input {
      border-radius: 0.8rem 0 0 0.8rem;
      background: #e8e8e8;
      width: 100%;
      padding: 1rem;
      border: none;
      color: #000;
    }

    /* 🌈 GLOW BUTTON */
    .input-container button {
      padding: 1rem;
      background: linear-gradient(135deg, orange, green);
      font-weight: 700;
      color: white;
      border: none;
      border-radius: 0 1rem 1rem 0;
      box-shadow: 0 0 10px rgba(0,255,0,0.6);
    }

    .music-btn{
      position:fixed;
      bottom:15px;
      left:50%;
      transform:translateX(-50%);
      background:#111;
      color:white;
      padding:10px 20px;
      border-radius:25px;
      border:1px solid #333;
      cursor:pointer;
      z-index:999;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="box">
      <div id="text">
        <i class="fa fa-user"></i>
        <h3 class="centered-text">BUGBOT PAIRING CODE</h3>
        <br>
        <h6>Made By Bugfixed Sulexh tech🔥🥳.</h6>
        <h6>Enter Your Number with Country Code.</h6>

        <div class="input-container">
          <input placeholder="2547xxxxxx" type="number" id="number">
          <button id="submit">Submit</button>
        </div>

        <br><br>
        <main id="pair"></main>
      </div>
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <audio id="bgMusic" loop autoplay>
    <source src="https://files.catbox.moe/s8tp1b.mp3" type="audio/mpeg">
  </audio>

  <!-- 🎵 BUTTON -->
  <div class="music-btn" id="musicBtn">⏸ Music</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");

    async function Copy() {
      let obj = document.getElementById("copy");
      let text = obj.innerText;

      await navigator.clipboard.writeText(text.replace('CODE: ', ''));
      obj.innerText = "COPIED";
      obj.style = "color:blue;font-weight:bold";

      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:white;font-weight:bold";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();

      if (!c.value) {
        a.innerHTML = '<a style="color:white;font-weight:bold">Enter your WhatsApp number</a><br><br>';
        return;
      }

      if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:red;font-weight:bold">Invalid Number</a><br><br>';
        return;
      }

      const number = c.value.replace(/[^0-9]/g, "");
      a.innerHTML = '<a style="color:white;font-weight:bold">Please Wait...</a><br><br>';

      try {
        let res = await axios(`/pair?number=${number}`);
        let code = res.data.code || "Service Unavailable";

        a.innerHTML =
          '<font id="copy" onclick="Copy()" style="color:red;font-weight:bold" size="5">CODE: <span style="color:white;font-weight:bold">'
          + code +
          '</span></font><br><br><br>';

      } catch (err) {
        a.innerHTML = '<a style="color:red;font-weight:bold">Server error</a><br><br>';
      }
    });

    /* 🎵 MUSIC CONTROL */
    let music = document.getElementById("bgMusic");
    let btn = document.getElementById("musicBtn");

    window.addEventListener("load", ()=>{
      music.volume = 0.4;
      let p = music.play();
      if(p !== undefined){
        p.catch(()=>{
          document.body.addEventListener("click", ()=>{
            music.play().catch(()=>{});
          },{once:true});
        });
      }
    });

    btn.onclick = ()=>{
      if(music.paused){
        music.play();
        btn.innerText="⏸ Music";
      }else{
        music.pause();
        btn.innerText="▶ Music";
      }
    };
  </script>

</body>
</html>
