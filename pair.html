<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Style Clone</title>

<style>
body{
  margin:0;
  background:#0b141a;
  font-family:Arial, sans-serif;
  color:white;
}

/* STATUS BAR */
.status-bar{
  display:flex;
  justify-content:space-between;
  padding:5px 10px;
  font-size:13px;
}
.icons{
  display:flex;
  gap:6px;
  align-items:center;
}
.signal,.wifi{
  width:14px;height:10px;border:2px solid white;border-top:none;
}
.battery{
  border:2px solid white;
  padding:2px 5px;
  border-radius:4px;
  font-size:10px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}
.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}
.profile{
  width:35px;height:35px;border-radius:50%;
}
.name{font-weight:bold;}
.sub{font-size:12px;color:#aaa;}

/* VIDEO CARD */
.card{
  margin:10px;
  border-radius:15px;
  overflow:hidden;
  background:#111;
  position:relative;
}

/* TOP PROFILE ROW */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}
.top-left{
  display:flex;
  align-items:center;
  gap:10px;
}
.top img{
  width:40px;height:40px;border-radius:50%;
}
.username{
  color:orange;
  font-weight:bold;
}
.bat{
  background:#00ff66;
  color:black;
  padding:4px 10px;
  border-radius:20px;
}

/* CONTENT */
.content{
  padding:15px;
  text-align:center;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  position:relative;
}

.title{
  font-size:28px;
  margin-bottom:10px;
}

/* MASK */
.mask{
  width:140px;
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
}

/* PLAY */
.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:50%;
  font-size:30px;
  cursor:pointer;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:15px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  background:linear-gradient(90deg,orange,green);
  color:white;
}

/* CAPTION */
.caption{
  padding:10px;
  font-size:14px;
}

/* PROGRESS */
.progress{
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 10px 10px;
}
.bar{
  flex:1;
  height:4px;
  background:#444;
  position:relative;
}
.bar::after{
  content:"";
  width:20%;
  height:100%;
  background:#00ff66;
  position:absolute;
}

/* MUSIC */
audio{display:none;}
</style>
</head>

<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span>15:14</span>
  <div class="icons">
    <div class="signal"></div>
    <div class="wifi"></div>
    <div class="battery">14</div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    ←
    <div>
      <div class="name">You</div>
      <div class="sub">Today, 11:32</div>
    </div>
  </div>
  <div>⭐ ↗ ⋮</div>
</div>

<!-- VIDEO CARD -->
<div class="card">

  <div class="top">
    <div class="top-left">
      <img src="https://i.imgur.com/6VBx3io.png">
      <div class="username">bugfixed sulexh tech</div>
    </div>
    <div class="bat">100%</div>
  </div>

  <div class="content">
    <div class="title">PAIRING CODE</div>

    <img src="https://i.imgur.com/9bK0F3N.png" class="mask">
    <div class="play" onclick="toggleMusic()">▶</div>

    <input placeholder="+2547XXXXXXXX">
    <button>GENERATE</button>
  </div>

  <div class="caption">Should I drop pairing link</div>

  <div class="progress">
    <span>00:03</span>
    <div class="bar"></div>
    <span>00:57</span>
    <span>1.0x</span>
  </div>

</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/s8tp1b.mp3">
</audio>

<script>
let music = document.getElementById("music");

function toggleMusic(){
  if(music.paused){
    music.play();
  }else{
    music.pause();
  }
}
</script>

</body>
</html>
