<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full-Screen Pairing App with Neon</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', sans-serif;}
html, body{width:100%;height:100%;background:black;overflow:hidden;}
body{display:flex;justify-content:center;align-items:stretch;}

/* FULL SCREEN CARD */
.card{
  width:100%;
  height:100vh; /* FULL SCREEN HEIGHT */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  overflow:hidden;
}

/* MOVING NEON PARTICLES */
.particle{
  position:absolute;
  border-radius:50%;
  opacity:0.6;
  animation: float 15s linear infinite;
}
@keyframes float{
  0%{transform:translateY(0px) translateX(0px);}
  50%{transform:translateY(-200px) translateX(100px);}
  100%{transform:translateY(0px) translateX(0px);}
}

/* BACKGROUND GLOW */
.card::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 30% 30%, #ff4d4d, transparent 40%), radial-gradient(circle at 70% 70%, #33ccff, transparent 40%);
  opacity:0.3;
  filter:blur(150px);
  animation: moveGlow 20s infinite alternate;
  z-index:0;
}
@keyframes moveGlow{
  0%{transform:translate(0,0);}
  50%{transform:translate(50px,-50px);}
  100%{transform:translate(-50px,50px);}
}

/* CONTENT ABOVE GLOW */
.content{
  position:relative;
  z-index:1;
  width:95%;
  max-width:400px;
  text-align:center;
  color:white;
}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.user{display:flex;align-items:center;gap:10px;}
.user img{width:50px;height:50px;border-radius:50%;}
.username{color:orange;font-weight:bold;font-size:18px;}
.battery{background:#0f0;padding:5px 12px;border-radius:20px;color:black;font-weight:bold;}

/* TITLE */
.title{font-size:32px;font-weight:bold;background:linear-gradient(90deg,orange,yellow,limegreen);
-webkit-background-clip:text;color:transparent;margin:15px 0;}

/* SUBTEXT */
.sub{font-size:14px;color:#ccc;margin-bottom:20px;}

/* INPUT */
.input-box input{
  width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;outline:none;margin-bottom:15px;
}

/* BUTTON */
.btn{width:100%;padding:15px;border:none;border-radius:12px;font-weight:bold;
background:linear-gradient(135deg,orange,green);color:white;font-size:16px;cursor:pointer;margin-bottom:20px;}

/* CODE BOX */
.code-box{margin-top:20px;padding:15px;border-radius:15px;background:rgba(255,255,255,0.1);
text-align:center;font-size:20px;font-weight:bold;letter-spacing:3px;color:white;}

/* ACTIONS */
.actions{display:flex;justify-content:space-around;margin-top:10px;color:white;font-size:13px;}
.actions span{cursor:pointer;}

/* COPY BTN */
.copy-btn{margin-top:15px;background:#00ff66;border:none;padding:12px;border-radius:25px;width:100%;font-weight:bold;cursor:pointer;}

/* MUSIC BUTTON */
.music-btn{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
background:#111;color:white;padding:12px 25px;border-radius:25px;cursor:pointer;border:1px solid #333;z-index:2;}

/* TIME */
.status-bar{
  position:absolute;top:10px;width:95%;display:flex;justify-content:space-between;color:white;font-size:14px;z-index:2;
}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar">
  <span id="time">12:36</span>
  <span>📶 📡 🔋</span>
</div>

<!-- AUDIO -->
<audio id="bg-music" loop autoplay>
  <source src="https://files.catbox.moe/s8tp1b.mp3" type="audio/mpeg">
</audio>

<!-- FULL SCREEN CARD -->
<div class="card" id="card">

  <!-- PARTICLES -->
  <!-- JS will generate floating neon particles -->
  
  <div class="content">
    <div class="header">
      <div class="user">
        <img src="https://i.imgur.com/6VBx3io.png">
        <div class="username">bugfixed sulexh tech</div>
      </div>
      <div class="battery">100%</div>
    </div>

    <div class="title">PAIRING CODE</div>
    <div class="sub">BUGFIXED-SULEXH-MD MULTI DEVICE</div>
    <div class="sub">Enter your number with country code</div>

    <div class="input-box">
      <input type="number" id="number" placeholder="+2547XXXXXXXX">
    </div>

    <button class="btn" id="submit">GENERATE</button>

    <div id="pair"></div>
  </div>

  <div class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 PLAY / PAUSE MUSIC</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
<script>
let a = document.getElementById("pair");
let b = document.getElementById("submit");
let c = document.getElementById("number");
let music = document.getElementById("bg-music");
let musicBtn = document.getElementById("musicBtn");
let card = document.getElementById("card");

/* TIME */
function updateTime(){
  let now = new Date();
  document.getElementById("time").innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2,'0');
}
setInterval(updateTime,1000);

/* MUSIC CONTROL */
function toggleMusic(){
  if(music.paused){
    music.volume = 0.4;
    music.play().then(()=>{musicBtn.innerText="⏸ STOP MUSIC";})
    .catch(()=>{alert("Tap again to enable sound 🔊");});
  }else{
    music.pause();
    musicBtn.innerText="🎵 PLAY MUSIC";
  }
}

/* AUTO PLAY ON FIRST TAP */
document.body.addEventListener("click", () => {
  if(music.paused){
    music.volume = 0.3;
    music.play().catch(()=>{});
  }
},{once:true});

/* GENERATE CODE */
b.onclick = async () => {
  if(!c.value){a.innerHTML='<div style="color:white">Enter number</div>';return;}
  let num = c.value.replace(/[^0-9]/g,"");
  a.innerHTML='<div style="color:white">Please wait...</div>';
  let {data} = await axios(`/pair/code?number=${num}`);
  let code = data.code || "ERROR";
  a.innerHTML = `
    <div class="code-box">CODE: <span id="realCode">${code}</span></div>
    <div class="actions">
      <span onclick="copyCode()">Copy</span>
      <span>Select</span>
      <span>Share</span>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">COPY</button>
  `;
}

/* COPY */
async function copyCode(){
  let code = document.getElementById("realCode").innerText;
  await navigator.clipboard.writeText(code);
  document.getElementById("copyBtn").innerText="COPIED!";
}

/* CREATE FLOATING PARTICLES */
for(let i=0;i<50;i++){
  let p = document.createElement("div");
  p.className="particle";
  let size = Math.random()*6+4;
  p.style.width = p.style.height = size+"px";
  p.style.background = `rgba(${Math.floor(Math.random()*255)},${Math.floor(Math.random()*255)},255,0.6)`;
  p.style.top = Math.random()*100+"%";
  p.style.left = Math.random()*100+"%";
  p.style.animationDuration = (5+Math.random()*10)+"s";
  p.style.animationDelay = (Math.random()*5)+"s";
  card.appendChild(p);
}
</script>
</body>
  </html>
